  <rect x="46" y="65" width="8" height="24" rx="3" fill="#c8e6c9"/>
  <!-- 葉（複数） -->
  <ellipse cx="34" cy="52" rx="16" ry="22" fill="#1b5e20" transform="rotate(-20 34 52)"/>
  <ellipse cx="50" cy="42" rx="16" ry="24" fill="#2e7d32"/>
  <ellipse cx="66" cy="52" rx="16" ry="22" fill="#1b5e20" transform="rotate(20 66 52)"/>
  <ellipse cx="38" cy="62" rx="13" ry="18" fill="#388e3c" transform="rotate(-10 38 62)"/>
  <ellipse cx="62" cy="62" rx="13" ry="18" fill="#388e3c" transform="rotate(10 62 62)"/>
  <!-- 葉脈 -->
  <line x1="34" y1="38" x2="34" y2="64" stroke="#0a3d0a" stroke-width="1.2"/>
  <line x1="50" y1="26" x2="50" y2="65" stroke="#0a3d0a" stroke-width="1.2"/>
  <line x1="66" y1="38" x2="66" y2="64" stroke="#0a3d0a" stroke-width="1.2"/>
