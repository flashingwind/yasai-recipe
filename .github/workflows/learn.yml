name: 毎日ランキングルール学習

on:
  schedule:
    # 毎日 22:00 UTC (翌日 7:00 JST) に実行
    - cron: "0 22 * * *"
  workflow_dispatch:

jobs:
  learn:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Python セットアップ
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 依存パッケージインストール
        run: pip install requests beautifulsoup4 pypdf anthropic

      - name: 市況データ取得
        run: python scrape_market_comment.py

      - name: ランキングルール学習
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python generate_ranking_rules.py > /tmp/rules_output.txt 2>&1; cat /tmp/rules_output.txt

      - name: ルール更新をコミット
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add ranking_rules.json
          git diff --cached --quiet || git commit -m "chore: update ranking rules via daily learning"
          git push || true
