name: 市況データ更新・サイトビルド

on:
  schedule:
    # 毎日 JST 9:00 (UTC 0:00) に実行
    - cron: "0 0 * * *"
  workflow_dispatch: # 手動実行も可能

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Python セットアップ
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 依存パッケージインストール
        run: pip install requests beautifulsoup4 pypdf anthropic openai

      - name: 野菜画像生成（未生成のみ）
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: python generate_images.py

      - name: 市況データ取得
        run: python scrape_market_comment.py

      - name: レシピ・ランキング生成
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python recommend_recipes.py

      - name: 静的サイトビルド
        run: python build_site.py

      - name: 変更をコミット・プッシュ
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/ market_data.csv .cache/
          git diff --cached --quiet || git commit -m "chore: 市況データ更新 $(date +'%Y-%m-%d')"
          git push
